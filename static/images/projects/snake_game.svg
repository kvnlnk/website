<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow_snake_game" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#10b98122" />
      <stop offset="100%" stop-color="#10b98100" />
    </radialGradient>
    <linearGradient id="bar_snake_game" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b98100" />
      <stop offset="30%" stop-color="#10b981" />
      <stop offset="70%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#10b98100" />
    </linearGradient>
    <filter id="f_snake_game">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" />
    </filter>
  </defs>

  <!-- Dark base -->
  <rect width="800" height="400" fill="#0d0d0d" rx="8" />

  <!-- Glow -->
  <rect width="800" height="400" fill="url(#glow_snake_game)" rx="8" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="3" fill="url(#bar_snake_game)" />

  <!-- Ambient dots -->
  <circle cx="100" cy="60" r="1.5" fill="#10b98133" />
  <circle cx="700" cy="80" r="2" fill="#10b98122" />
  <circle cx="150" cy="350" r="2" fill="#10b98122" />
  <circle cx="650" cy="340" r="1.5" fill="#10b98133" />
  <circle cx="400" cy="380" r="1" fill="#10b98115" />

  <!-- Subtle grid lines -->
  <line x1="100" y1="120" x2="100" y2="280" stroke="#10b98106" stroke-width="1" />
  <line x1="250" y1="120" x2="250" y2="280" stroke="#10b98106" stroke-width="1" />
  <line x1="550" y1="120" x2="550" y2="280" stroke="#10b98106" stroke-width="1" />
  <line x1="700" y1="120" x2="700" y2="280" stroke="#10b98106" stroke-width="1" />
  <line x1="100" y1="160" x2="700" y2="160" stroke="#10b98106" stroke-width="1" />
  <line x1="100" y1="240" x2="700" y2="240" stroke="#10b98106" stroke-width="1" />

  <!-- Outer ring (glow) -->
  <circle cx="400" cy="180" r="82" fill="#10b98108" filter="url(#f_snake_game)" />

  <!-- Icon circle -->
  <circle cx="400" cy="180" r="68" fill="#10b98110" stroke="#10b98144" stroke-width="1.5" />
  <circle cx="400" cy="180" r="55" fill="#10b98108" />

  <!-- Project icon -->
  <g transform="translate(400, 180)">
    {path_tags}
  </g>

  <!-- Project name -->
  <text x="400" y="296" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="700" fill="#f0f0f0" text-anchor="middle" letter-spacing="-0.02em" opacity="0.95">Snake Game</text>

  <!-- Divider -->
  <rect x="365" y="314" width="70" height="2" rx="1" fill="#10b98155" />

  <!-- Tag -->
  <rect x="365" y="326" width="70" height="20" rx="10" fill="#10b98115" />
  <text x="400" y="339" font-family="system-ui,sans-serif" font-size="10" fill="#10b981aa" text-anchor="middle" dominant-baseline="middle" font-weight="600" letter-spacing="0.08em">SG</text>
</svg>